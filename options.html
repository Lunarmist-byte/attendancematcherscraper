<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Attendance Scraper Options</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 24px;
      max-width: 500px;
      margin: 0 auto;
    }
    h2 { margin-top: 0; }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      font-family: monospace;
    }
    button {
      background-color: #6366f1;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: background-color 0.2s;
    }
    button:hover { background-color: #4f46e5; }
    #status {
      margin-top: 12px;
      font-size: 14px;
      color: #10b981;
    }
  </style>
</head>
<body>
  <h2>Supabase Configuration</h2>
  <p>Enter your Supabase project credentials so the extension can read and write to your member database.</p>
  
  <div class="form-group">
    <label for="supabaseUrl">Supabase URL</label>
    <input type="text" id="supabaseUrl" placeholder="https://your-project-id.supabase.co" />
  </div>
  
  <div class="form-group">
    <label for="supabaseKey">Supabase Anon Key</label>
    <input type="password" id="supabaseKey" placeholder="eyJhbGciOiJIUzI1NiIsInR5..." />
  </div>
  
  <button id="saveBtn">Save Configuration</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
