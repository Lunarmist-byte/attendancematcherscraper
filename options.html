<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Attendance Scraper Options</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
    <h2>Supabase Configuration</h2>
    <button id="themeToggle" style="width: auto; padding: 6px; margin: 0; background: transparent; color: var(--text-main);" title="Toggle Theme">
      <i data-lucide="moon"></i>
    </button>
  </div>
  
  <p>Enter your Supabase project credentials so the extension can read and write to your member database.</p>
  
  <div class="form-group">
    <label for="supabaseUrl">Supabase URL</label>
    <input type="text" id="supabaseUrl" placeholder="https://your-project-id.supabase.co" />
  </div>
  
  <div class="form-group">
    <label for="supabaseKey">Supabase Anon Key</label>
    <input type="password" id="supabaseKey" placeholder="eyJhbGciOiJIUzI1NiIsInR5..." />
  </div>
  
  <button id="saveBtn"><i data-lucide="save" style="width: 16px; height: 16px; margin-right: 6px; vertical-align: text-bottom;"></i> Save Configuration</button>
  <div id="status"></div>

  <div style="margin-top: 24px; font-size: 12px; color: var(--text-muted); border-top: 1px solid var(--border-color); padding-top: 16px;">
    Made by <strong>Lunarmist-byte</strong><br>
    <a href="https://github.com/Lunarmist-byte" target="_blank" style="color: var(--primary-color); text-decoration: none; margin-right: 12px;">GitHub</a>
    <a href="https://www.linkedin.com/in/amal-s-kumar-ba69a1290/" target="_blank" style="color: var(--primary-color); text-decoration: none;">LinkedIn</a>
  </div>

  <script src="lucide.min.js"></script>
  <script src="theme.js"></script>
  <script src="options.js"></script>
</body>
</html>
