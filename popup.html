<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
    <h3 style="margin: 0;">Attendance Scraper</h3>
    <button id="themeToggle" class="btn-secondary" style="width: auto; padding: 6px; margin: 0; background: transparent; color: var(--text-main);" title="Toggle Theme">
      <i data-lucide="moon"></i>
    </button>
  </div>
  
  <input type="text" id="filenameInput" placeholder="Custom filename (optional)" />
  
  <div class="btn-group">
    <button id="scrapePdfBtn"><i data-lucide="file-text"></i> PDF</button>
    <button id="scrapeJsonBtn"><i data-lucide="file-json"></i> JSON</button>
  </div>
  
  <div class="divider"></div>
  
  <div class="section">
    <h4>Member Sync</h4>
    <button id="scrapeMembersBtn" class="btn-secondary"><i data-lucide="users"></i> Scrape Members</button>
    <div class="btn-group">
      <button id="downloadDbBtn" class="btn-secondary"><i data-lucide="download"></i> Download db.json</button>
      <button id="clearDbBtn" class="btn-danger"><i data-lucide="trash-2"></i> Clear DB</button>
    </div>
    
    <div style="display: flex; gap: 8px; margin-top: 8px; align-items: center;">
      <input type="file" id="dbUploadInput" accept=".json" style="margin-bottom: 0;" />
      <button id="uploadSupabaseBtn" class="btn-success" style="margin-bottom: 0; padding: 6px 12px; white-space: nowrap;"><i data-lucide="upload-cloud"></i> Sync</button>
    </div>
  </div>

  <div class="divider"></div>

  <div class="btn-group">
    <button id="optionsBtn" class="btn-secondary"><i data-lucide="settings"></i> Config</button>
    <button id="cceaBtn" class="btn-secondary"><i data-lucide="external-link"></i> Maker Clubs</button>
  </div>

  <div id="status"></div>

  <div style="margin-top: 16px; font-size: 11px; color: var(--text-muted); text-align: center;">
    Made by <strong>Lunarmist-byte</strong><br>
    <a href="https://github.com/Lunarmist-byte" target="_blank" style="color: var(--primary-color); text-decoration: none; margin-right: 8px;">GitHub</a>
    <a href="https://www.linkedin.com/in/amal-s-kumar-ba69a1290/" target="_blank" style="color: var(--primary-color); text-decoration: none;">LinkedIn</a>
  </div>

  <!-- Scripts -->
  <script src="jspdf.umd.min.js"></script>
  <script src="lucide.min.js"></script>
  <script src="theme.js"></script>
  <script src="popup.js"></script>
</body>
</html>
