<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Attendance Scraper</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 16px;
      width: 250px;
      text-align: center;
    }
    button {
      background-color: #6366f1;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      width: 100%;
      margin-bottom: 12px;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #4f46e5;
    }
    #status {
      font-size: 12px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <h3 style="margin-top: 0;">Attendance Scraper</h3>
  <button id="scrapeBtn">Scrape & Download</button>
  <div id="status">Ready. Open an event page to scrape.</div>
  <script src="popup.js"></script>
</body>
</html>
